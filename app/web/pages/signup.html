{{ define "signup" }}
<!DOCTYPE html>
<html lang="en" >
    <head>
        <title>Signup</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="/css/away.css" rel="stylesheet">
        <script
            src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js"
            integrity="sha384-Akqfrbj/HpNVo8k11SXBb6TlBWmXXlYQrCSqEWmyKJe+hDm3Z/B2WVG4smwBkRVm"
            crossorigin="anonymous"
        >
        </script>
    </head>
    <body hx-swap="innerHTML">
        <div class="flex form-container " id="content">
            <form class="flex column gap-1 p-1" hx-post="/signup" hx-swap="outerHTML" hx-target="#content">
                <h2>Sign Up</h2>
                <div class="flex row gap-1">
                    <div class="flex column">
                        <label class="p-thin" for="name">Name</label>
                        <input class="p-thin rounded-1" type="text" name="name" />
                    </div>
                    <div class="flex column">
                        <label class="p-thin" for="lastName">Last Name</label>
                        <input class="p-thin rounded-1" type="text" name="lastName">
                    </div>
                </div>
                <div>
                    <div class="flex column">
                        <lable for="email" class="p-thin">Email</lable>
                        <input class="p-thin rounded-1" type="email" name="email" />
                    </div>
                    <div class="flex column">
                        <label class="p-thin" for="dob">Date of Birth</label>
                        <input class="p-thin rounded-1" type="date" name="dob" />
                    </div>
                </div>
                <div>
                    <select class="p-thin" name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button class="p-thin" type="submit">Signup</button>
                <!-- private CountryDTO from; -->
                <!-- private String gender; -->
                <!-- // account -->
                <!-- private CurrencyDTO currency; -->
                <!-- private CountryDTO country; -->
                <!-- private CityDTO city; -->
                <!-- private String password; -->
            </form>
        </div>
    </body>
    <script>
        document.addEventListener("DOMContentLoaded", (event) => {
            document.body.addEventListener('htmx:beforeSwap', function(evt) {
                // allow 422 responses to swap as we are using this as a signal
                // that a form was submitted with bad data and want to rerender
                // with the erros
                evt.detail.shouldSwap = true;
                evt.detail.isError = false;
            })
        })
    </script>
</html>
{{ end }}
